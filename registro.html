<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Global Import</title>
</head>
<body>
  <header>
    <nav class="navbar" aria-label="Navegación principal">
      <a href="index.html" class="brand">
        <img src="assets/images/logo.png" alt="Logo Global Import" width="120" />
      </a>
      <button class="nav-toggle" type="button" aria-controls="main-navigation" aria-expanded="false">
        Menú
      </button>
      <ul id="main-navigation" class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="index.html#servicios">Servicios</a></li>
        <li><a href="index.html#contacto">Contacto</a></li>
        <li><a href="registro.html">Registro</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h1>Registro</h1>
      <p>Completa el siguiente formulario para registrarte y recibir información.</p>
      <form action="#" method="post">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required />

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required />

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" />

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4"></textarea>

        <button type="submit">Enviar registro</button>
      </form>
    </section>
  </main>

  <script>
    const toggleButton = document.querySelector('.nav-toggle');
    const navigation = document.getElementById('main-navigation');

    if (toggleButton && navigation) {
      toggleButton.addEventListener('click', () => {
        const expanded = toggleButton.getAttribute('aria-expanded') === 'true';
        toggleButton.setAttribute('aria-expanded', String(!expanded));
        navigation.classList.toggle('open');
      });
    }
  </script>
</body>
</html>
